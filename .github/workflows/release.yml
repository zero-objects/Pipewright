name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}   # build the artifacts without tagging, to verify

permissions:
  contents: write

jobs:
  # ── Primary artifact: the pipewright CLI (no Qt), for all three OSes ──────
  cli:
    name: cli / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            asset: macos-arm64
          - os: ubuntu-22.04
            asset: linux-x86_64
          - os: windows-2022
            asset: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build CLI
        run: cargo build --release -p pipeline-cli --locked
      - name: Stage CLI
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/release/pipewright.exe "dist/pipewright-cli-${{ matrix.asset }}.exe"
          else
            cp target/release/pipewright "dist/pipewright-cli-${{ matrix.asset }}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.os }}
          path: dist/*

  # ── macOS desktop UI: self-contained .dmg (macdeployqt bundles Qt) ───────
  ui-macos:
    name: ui / macos (.dmg)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Qt + CMake
        run: brew install qt cmake
      - name: Build
        run: |
          cmake -S ui/qt6 -B ui/qt6/build -DCMAKE_BUILD_TYPE=Release
          cmake --build ui/qt6/build -j
      - name: Package
        run: cd ui/qt6/build && cpack -G DragNDrop -C Release
      - uses: actions/upload-artifact@v4
        with:
          name: ui-macos
          path: ui/qt6/build/*.dmg

  # ── Linux desktop UI: .deb depending on the distro's Qt6. Runs inside a
  #    Debian-13 container (Qt 6.8) — Ubuntu 22.04's Qt is too old (< 6.5).
  ui-linux:
    name: ui / linux (.deb)
    runs-on: ubuntu-22.04
    container: rust:1.88-trixie
    steps:
      - uses: actions/checkout@v5
      - name: Install Qt + build deps
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends qt6-base-dev qt6-declarative-dev \
            libqt6svg6-dev qml6-module-qtquick-controls cmake ninja-build file git \
            build-essential libxkbcommon-dev
      - name: Build
        run: |
          cmake -S ui/qt6 -B ui/qt6/build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build ui/qt6/build -j
      - name: Package
        run: cd ui/qt6/build && cpack -G DEB -C Release
      - uses: actions/upload-artifact@v4
        with:
          name: ui-linux
          path: ui/qt6/build/*.deb

  # ── Windows desktop UI: NSIS .exe (windeployqt bundles the Qt DLLs).
  #    windows-2022 ships Visual Studio; Qt comes from install-qt-action.
  #    qtdeclarative/qtsvg are part of the base install, so no `modules:`.
  ui-windows:
    name: ui / windows (.exe)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          arch: win64_msvc2022_64
      - name: Install NSIS
        run: choco install -y nsis --no-progress
      - name: Build
        run: |
          cmake -S ui/qt6 -B ui/qt6/build -G "Visual Studio 17 2022" -A x64
          cmake --build ui/qt6/build --config Release
      - name: Package
        run: |
          $env:PATH = "C:\Program Files (x86)\NSIS;$env:PATH"
          cd ui/qt6/build
          cpack -C Release -G NSIS
      - uses: actions/upload-artifact@v4
        with:
          name: ui-windows
          path: ui/qt6/build/*.exe

  # ── Publish: collect every artifact into the GitHub Release ──────────────
  release:
    needs: [cli, ui-macos, ui-linux, ui-windows]
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Checksums
        run: |
          cd artifacts
          find . -type f ! -name SHA256SUMS.txt -exec sha256sum {} + \
            | sed 's| \./[^/]*/| |' | sort -k2 > SHA256SUMS.txt
          cat SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*
            artifacts/SHA256SUMS.txt
          generate_release_notes: true
