before_install = { type = "boolean | enum | list<string> | string" }
before_script = { type = "boolean | enum | list<string> | string" }
bioc_packages = { type = "list<string>" }
branches = { type = "map<string>" }
brew_packages = { type = "list<string>" }
bundler_args = { type = "string" }
cache = { type = "enum | list<enum | map<string>> | map<string>" }
compiler = { type = "enum | list<enum>" }
cran = { type = "string" }
crystal = { type = "list<string>" }
