# catalog/travis.toml — construct inventory, generated from the JSON-Schema.
# One [section] per construct; each key carries type / options / required.
# A type that is a bare construct name is a nesting into that section.

[meta]
platform = "travis"
config_file = ".travis.yml"
tier = 1
source = "json-schema"

[deployment]
on = { type = "map<string>" }

[job]
addons = { type = "map<string>" }
after_deploy = { type = "boolean | enum | list<string> | string" }
after_failure = { type = "boolean | enum | list<string> | string" }
after_script = { type = "boolean | enum | list<string> | string" }
after_success = { type = "boolean | enum | list<string> | string" }
android = { type = "map<string>" }
apt_packages = { type = "list<string>" }
arch = { type = "enum | list<enum>" }
