# catalog/ir.toml — the normalized IR construct catalog. DRAFT.
#
# The "common discriminator": each [section] is one neutral pipeline
# concept synthesized from the 17 per-target inventories. The bar is
# COMPLETENESS — every construct section of every catalog/<platform>
# .toml must be accounted for, either:
#   * mapped — listed under some [<construct>.maps].<platform>, or
#   * folded — listed in [folds] with a written reason (a section
#     that is a field-of, an auth/variant of, or schema-decomposition
#     noise of, another construct).
# `catalog/check_ir_coverage.py` verifies this and fails on any gap.
# An unaccounted section is a hole the IR would have to paper over
# with `opaque` — exactly the doubling this catalog exists to avoid.
#
# TERMINOLOGY: `job` = a unit of work on one agent; `step` = one
# command inside a job. Platforms disagree on the word "step" — the
# maps translate each platform's word into this.

[meta]
kind = "ir-catalog-draft"
derived_from = "catalog/<platform>.toml (17 targets)"

