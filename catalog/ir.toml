# earthly's LABEL/EXPOSE/VOLUME/HEALTHCHECK are DISTINCT concepts, not generic
# behaviour flags — lumping them into `options` made another platform's options
# (gitlab coverage/pages/…) collapse onto earthly's first options key (LABEL) on
# cross-emit, emitting two `LABEL` lines that don't round-trip (the gitlab→earthly
# drift). Split into dedicated scalar fields so earthly has no generic
# (job, options) target; foreign options fall away cleanly (not earthly concepts).
[job.field.labels]
doc = "Image/build labels (earthly LABEL)."
scalar = true
earthly = ["LABEL"]

[job.field.expose]
doc = "Exposed ports (earthly EXPOSE)."
scalar = true
earthly = ["EXPOSE"]

[job.field.volume]
doc = "Volume declarations (earthly VOLUME)."
scalar = true
earthly = ["VOLUME"]

[job.field.healthcheck]
doc = "Container healthcheck (earthly HEALTHCHECK)."
scalar = true
earthly = ["HEALTHCHECK"]

[step]
doc = "One command or action inside a job. Each [step.field.*] is a normalized IR field; the per-platform lists are the source keys that feed it — every key of every mapped section lands in exactly one field."

[step.maps]
github = ["step", "defaults"]
gitlab = ["stepGitReference", "stepOciReference"]
jenkins = ["step"]
azure = ["task", "taskBase", "stepsTemplate", "jobDecoratorSteps"]
# CircleCI: see [job.maps] — synthetic step mapping so the
# `R_circleci_step` construct rule materialises.
circleci = ["step"]
bitbucket = ["pipe", "agent_task"]
tekton = ["step"]
argo = ["container", "script"]
dagger = ["container"]
buildkite = ["commandStepManualRetryObject", "blockStep", "nestedBlockStep"]
google_cloudbuild = ["BuildStep"]
# Drone/Woodpecker share the step-item shape — the items under
# `steps:` carry the step definition inline. The catalog has no
# dedicated [step] section for them (steps live as map-of-objects);
# the synthetic mapping drives the construct rule generator.
drone = ["step"]
woodpecker = ["step"]
travis = ["step"]

[step.field.run]
doc = "Inline command(s) the step executes."
