[step.field.options]
doc = "Step behaviour flags / settings without a dedicated field."
# Buildkite command-step concurrency knobs are scalar flags, not a
# concurrency CONSTRUCT — modelled as step-level scalar attrs (the bare
# `concurrency` integer remains a concurrency construct key). Without a
# step home these lived only under the dead job.field.concurrency mapping
# (buildkite is bijektiv-flach: steps -> hub:step, no hub:job) and were
# dropped backward.
buildkite = ["concurrency_group", "concurrency_method", "cancel_on_build_failing"]
# woodpecker container step body fields without a dedicated IR step field:
# behaviour flags (detach/pull/privileged), the display `name` (the step's
# IDENTITY is its map key, so name: is a label), and the nested
# entrypoint/dns/settings/backend_options (classify routes each by its own
# type — scalar/seq/block — under the options field).
