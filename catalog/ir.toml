# EVENT-GATED sub-pipelines. Each sub-pipeline is itself a full step
# sequence — hence the self-ref onto `pipeline` rather than onto `stage`
# or a dedicated construct: the sub-pipeline carries the same step /
# condition structures as the top level. Other platforms leave this
# field empty. Consequence in the hub graph: bitbucket cascades produce
# 1 + N hub:pipeline nodes (top level + N named sub-pipelines), linked
# via `has_pipeline`.
