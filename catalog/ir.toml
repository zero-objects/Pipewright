# ── lexical layer — round-trip fidelity ─────────────────────────
# These have NO entry in any platform's construct schema, yet they
# live in the source file and must live in the IR: without them
# a -> ir -> a loses the user's formatting and a -> ir -> b cannot
# preserve intent. They are universal (every target has comments
# and whitespace) and are carried from the CST layer. `source =
# "cst"` marks that — the coverage check does not expect a schema
# construct behind them.

[comment]
doc = "A source comment — leading (above an element), trailing (end-of-line), or standalone. Bound to the nearest construct so an edit carries it along."
source = "cst"

[blank_run]
doc = "A run of blank lines between elements — preserved so emit does not collapse intentional spacing."
source = "cst"

[key_order]
doc = "The order keys appear within a mapping. YAML mappings are ordered in practice; recorded so emit does not reshuffle."
source = "cst"

[anchor]
doc = "A YAML anchor / alias (&a, *a) or merge key (<<:). The IR records the anchor graph so emit can re-emit the alias instead of inlining the resolved value."
source = "cst"

[scalar_style]
doc = "How a scalar was written — plain, single/double-quoted, block-literal (|), block-folded (>), flow. Recorded per scalar so emit preserves it."
source = "cst"

[provenance]
doc = "Byte range of every element in its source file. Enables surgical re-emit of only changed regions, and diagnostics."
source = "cst"

# No fold / ignore registry: a CI pipeline construct never carries
# zero information, so nothing may be discarded. Every platform
# section maps to an IR construct — including schema-decomposition
# variants (a `nested*` twin maps to the same construct as its
# base) and field-carrier blocks (`defaults`, `options`, whose keys
# become fields of the construct they configure). Many platform
# sections map to one IR construct — that is normalization, not
# loss.

