steps:
  - name: 'gcr.io/cloud-builders/git'
    id: clone
    args:
      - 'clone'
      - 'https://github.com/example/rust-app'
      - '.'
    timeout: '120s'

  - name: 'rust:1.75'
    id: fmt
    waitFor:
      - clone
    entrypoint: cargo
    args: ['fmt', '--check']
    env:
      - 'CARGO_HOME=/workspace/.cargo'
    dir: '/workspace'
    allowExitCodes:
      - 0
      - 101

  - name: 'rust:1.75'
    id: clippy
    waitFor:
      - clone
    entrypoint: cargo
    args: ['clippy', '--all-targets', '--', '-D', 'warnings']
    env:
      - 'CARGO_HOME=/workspace/.cargo'

  - name: 'rust:1.75'
    id: test
    waitFor:
      - fmt
      - clippy
    entrypoint: cargo
    args: ['test', '--workspace', '--release']
    env:
      - 'CARGO_HOME=/workspace/.cargo'
      - 'RUST_BACKTRACE=full'
    secretEnv:
      - REGISTRY_TOKEN
    timeout: '1800s'
    allowFailure: false

  - name: 'gcr.io/cloud-builders/docker'
    id: docker-build
    waitFor:
      - test
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/app:$COMMIT_SHA'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: docker-push
    waitFor:
      - docker-build
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/app:$COMMIT_SHA'

images:
  - 'gcr.io/$PROJECT_ID/app:$COMMIT_SHA'

artifacts:
  objects:
    location: 'gs://my-artifacts/builds'
    paths:
      - 'target/release/app'
      - 'target/test-results/*'
  mavenArtifacts: []
  npmPackages: []

substitutions:
  _RUST_VERSION: '1.75'
  _ENV: 'staging'

options:
  machineType: E2_HIGHCPU_8
  diskSizeGb: 100
  logging: CLOUD_LOGGING_ONLY
  dynamicSubstitutions: true
  pool:
    name: 'projects/$PROJECT_ID/locations/us-east1/workerPools/build-pool'
  volumes:
    - name: cargo-cache
      path: /workspace/.cargo
  env:
    - 'BUILD_ID=$BUILD_ID'

timeout: '3600s'
serviceAccount: 'projects/$PROJECT_ID/serviceAccounts/cloudbuild@$PROJECT_ID.iam.gserviceaccount.com'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/registry-token/versions/latest
      env: REGISTRY_TOKEN

tags:
  - 'rust'
  - 'release-pipeline'

logsBucket: 'gs://my-build-logs'
