language = "C"
include_guard = "PIPELINE_FFI_H"
autogen_warning = "// Auto-generated by cbindgen — do NOT edit by hand. Regenerate with: cbindgen --config cbindgen.toml --crate pipeline-ffi --output include/pipeline_ffi.h"
cpp_compat = true
sys_includes = ["stdarg.h", "stdbool.h", "stdint.h", "stdlib.h", "stddef.h"]
no_includes = true
tab_width = 4
style = "type"

[export]
include = ["PipelineString"]

[parse]
parse_deps = false
